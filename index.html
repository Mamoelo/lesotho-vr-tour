<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesotho VR Tour — Katse Dam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #080f09;
    color: #f0ebe0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 50%, rgba(30, 80, 35, 0.5) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 30%, rgba(15, 50, 80, 0.6) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 90%, rgba(20, 50, 25, 0.7) 0%, transparent 50%),
      linear-gradient(160deg, #080f09 0%, #050d14 100%);
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(180, 145, 50, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180, 145, 50, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: gridMove 20s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(80px); }
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: orbFloat 8s ease-in-out infinite;
  }

  .orb1 { width: 400px; height: 400px; background: rgba(30, 90, 40, 0.15); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: rgba(15, 60, 100, 0.2); bottom: -80px; right: -80px; animation-delay: -3s; }
  .orb3 { width: 200px; height: 200px; background: rgba(180, 145, 50, 0.08); top: 50%; right: 20%; animation-delay: -5s; }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -30px) scale(1.05); }
    66% { transform: translate(-15px, 20px) scale(0.95); }
  }

  .particles { position: absolute; inset: 0; overflow: hidden; }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(180, 145, 50, 0.6);
    border-radius: 50%;
    animation: particleRise linear infinite;
  }

  @keyframes particleRise {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label {
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(180, 145, 50, 0.7);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .country {
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240, 235, 224, 0.4);
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 12vw, 10rem);
    font-weight: 900;
    line-height: 0.88;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.7s forwards;
  }

  .title .word1 { display: block; color: #f0ebe0; text-shadow: 0 0 80px rgba(30, 90, 40, 0.4); }
  .title .word2 { display: block; font-style: italic; color: #c8a84b; text-shadow: 0 0 60px rgba(200, 168, 75, 0.3); }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 2.5rem 0;
    opacity: 0;
    animation: fadeUp 1s ease 0.9s forwards;
  }

  .divider-line { width: 80px; height: 1px; background: linear-gradient(to right, transparent, rgba(200, 168, 75, 0.5)); }
  .divider-line:last-child { background: linear-gradient(to left, transparent, rgba(200, 168, 75, 0.5)); }
  .divider-dot { width: 5px; height: 5px; background: rgba(200, 168, 75, 0.7); border-radius: 50%; }

  .tagline {
    font-size: 0.9rem;
    font-weight: 300;
    color: rgba(240, 235, 224, 0.45);
    letter-spacing: 0.08em;
    margin-bottom: 4rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.1s forwards;
  }

  .explore-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 1s ease 1.3s forwards;
    padding: 0;
  }

  .btn-inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    background: rgba(200, 168, 75, 0.08);
    border: 1px solid rgba(200, 168, 75, 0.35);
    padding: 1.2rem 3rem;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
    transition: all 0.4s ease;
    overflow: hidden;
  }

  .btn-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200, 168, 75, 0.15), rgba(30, 90, 40, 0.15));
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .explore-btn:hover .btn-inner { border-color: rgba(200, 168, 75, 0.7); transform: translateY(-3px); box-shadow: 0 20px 60px rgba(200, 168, 75, 0.1); }
  .explore-btn:hover .btn-inner::before { opacity: 1; }

  .btn-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #c8a84b;
    position: relative;
    z-index: 1;
  }

  .btn-arrow {
    width: 32px; height: 32px;
    border: 1px solid rgba(200, 168, 75, 0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    transition: all 0.4s ease;
  }

  .explore-btn:hover .btn-arrow { background: rgba(200, 168, 75, 0.2); border-color: rgba(200, 168, 75, 0.7); transform: rotate(45deg); }
  .btn-arrow svg { width: 14px; height: 14px; fill: none; stroke: #c8a84b; stroke-width: 1.5; }

  .corner { position: fixed; width: 60px; height: 60px; opacity: 0.3; }
  .corner-tl { top: 2rem; left: 2rem; border-top: 1px solid #c8a84b; border-left: 1px solid #c8a84b; }
  .corner-tr { top: 2rem; right: 2rem; border-top: 1px solid #c8a84b; border-right: 1px solid #c8a84b; }
  .corner-bl { bottom: 2rem; left: 2rem; border-bottom: 1px solid #c8a84b; border-left: 1px solid #c8a84b; }
  .corner-br { bottom: 2rem; right: 2rem; border-bottom: 1px solid #c8a84b; border-right: 1px solid #c8a84b; }

  .bottom-info {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease 1.8s forwards;
  }

  .info-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
  .info-value { font-family: 'Playfair Display', serif; font-size: 1rem; color: #c8a84b; }
  .info-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(240, 235, 224, 0.3); }
  .info-sep { width: 1px; height: 30px; background: rgba(200, 168, 75, 0.2); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="content">
  <p class="label">Virtual Reality Travel Experience</p>
  <p class="country">Kingdom of Lesotho</p>
  <h1 class="title">
    <span class="word1">Katse</span>
    <span class="word2">Dam</span>
  </h1>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>
  <p class="tagline">An immersive guided tour through one of Africa's greatest engineering achievements</p>

  <a class="explore-btn" href="tour.html">
    <div class="btn-inner">
      <span class="btn-text">Explore Katse Dam</span>
      <div class="btn-arrow">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </div>
  </a>
</div>

<div class="bottom-info">
  <div class="info-item"><span class="info-value">185m</span><span class="info-label">Height</span></div>
  <div class="info-sep"></div>
  <div class="info-item"><span class="info-value">1996</span><span class="info-label">Completed</span></div>
  <div class="info-sep"></div>
  <div class="info-item"><span class="info-value">−29.32°</span><span class="info-label">Latitude</span></div>
  <div class="info-sep"></div>
  <div class="info-item"><span class="info-value">28.53°</span><span class="info-label">Longitude</span></div>
</div>

<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (8 + Math.random() * 12) + 's';
    p.style.animationDelay = (-Math.random() * 20) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(p);
  }
</script>
</body>
</html>
